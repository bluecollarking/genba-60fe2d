<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GENBA — 拾い出しレビュー スワイプカード プロトタイプ</title>
<style>
  :root{
    --ai:#16306e;
    --blue:#4fb0ff;
    --orange:#ff8a3d;
    --bg:#0a0f16;
    --green:#3ddc84;
    --red:#ff5470;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(79,176,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,176,255,0.10) 1px, transparent 1px);
    background-size:28px 28px;
    color:#eaf2ff;
    display:flex;
    justify-content:center;
    overflow:hidden;
  }
  .device{
    width:390px;
    max-width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(10,15,22,0.15), rgba(10,15,22,0.92) 40%);
  }

  /* Header */
  header{
    flex:0 0 auto;
    padding:14px 16px 10px;
    display:flex;
    align-items:center;
    gap:10px;
    border-bottom:2px solid var(--orange);
    background:
      repeating-linear-gradient(135deg, rgba(255,138,61,0.08) 0 10px, transparent 10px 20px),
      rgba(10,15,22,0.9);
    z-index:20;
  }
  .logo-hex{width:34px;height:34px;flex:0 0 auto;}
  .brand-text{display:flex;flex-direction:column;line-height:1.2;}
  .brand-text .name{font-weight:800;font-size:14px;letter-spacing:0.06em;color:#fff;}
  .brand-text .catch{font-size:9px;color:var(--blue);letter-spacing:0.02em;}
  .header-count{
    margin-left:auto;
    font-size:11px;
    font-weight:700;
    color:#9db4d6;
    background:rgba(79,176,255,0.12);
    border:1px solid rgba(79,176,255,0.35);
    border-radius:20px;
    padding:5px 10px;
    white-space:nowrap;
  }
  .header-count b{color:#fff; font-size:13px;}

  /* progress dots */
  .dots{
    flex:0 0 auto;
    display:flex;
    justify-content:center;
    gap:5px;
    padding:10px 12px 4px;
    z-index:20;
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:rgba(255,255,255,0.18);
    transition:all .25s ease;
  }
  .dot.done{background:var(--blue);}
  .dot.current{background:var(--orange); width:16px; border-radius:4px;}

  /* Card stage */
  .stage{
    position:relative;
    flex:1 1 auto;
    margin:8px 16px 4px;
    perspective:1200px;
  }
  .card{
    position:absolute;
    inset:0;
    border-radius:20px;
    background:linear-gradient(160deg, rgba(22,48,110,0.55), rgba(10,15,22,0.9));
    border:1px solid rgba(79,176,255,0.28);
    box-shadow:0 18px 40px rgba(0,0,0,0.45);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    will-change:transform, opacity;
    touch-action:pan-y;
  }
  .card .cat-strip{
    flex:0 0 auto;
    padding:10px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(79,176,255,0.10);
    border-bottom:1px dashed rgba(79,176,255,0.3);
  }
  .cat-tag{
    font-size:10.5px; font-weight:700; letter-spacing:.04em;
    color:var(--blue);
    background:rgba(79,176,255,0.14);
    border:1px solid rgba(79,176,255,0.4);
    border-radius:6px;
    padding:3px 8px;
  }
  .conf-tag{
    font-size:10px; font-weight:700; color:#9db4d6;
  }
  .conf-tag.high{color:var(--green);}
  .conf-tag.mid{color:var(--orange);}

  .card-body{
    flex:1 1 auto;
    padding:18px 18px 8px;
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow:hidden;
  }
  .item-icon{
    width:56px;height:56px;
    border-radius:14px;
    background:rgba(255,138,61,0.14);
    border:1px solid rgba(255,138,61,0.4);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
  }
  .item-name{font-size:20px; font-weight:800; color:#fff; line-height:1.3;}
  .item-source{font-size:11px; color:#9db4d6;}
  .spec-grid{
    margin-top:6px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .spec-box{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:10px;
    padding:8px 10px;
  }
  .spec-box .label{font-size:9.5px; color:#7d93b8;}
  .spec-box .value{font-size:14.5px; font-weight:700; color:#fff; margin-top:2px;}
  .spec-box .value.price{color:var(--orange);}
  .thumb-area{
    margin-top:4px;
    flex:1 1 auto;
    border-radius:12px;
    background:
      repeating-linear-gradient(45deg, rgba(79,176,255,0.08) 0 8px, transparent 8px 16px),
      rgba(79,176,255,0.05);
    border:1px dashed rgba(79,176,255,0.3);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:#6f89b3;
    min-height:54px;
  }

  /* swipe stamps */
  .stamp{
    position:absolute;
    top:22px;
    padding:6px 14px;
    border-radius:8px;
    font-weight:900;
    font-size:20px;
    letter-spacing:.06em;
    opacity:0;
    z-index:5;
    transform:rotate(-14deg);
  }
  .stamp.adopt{left:16px; color:var(--green); border:3px solid var(--green);}
  .stamp.reject{right:16px; color:var(--red); border:3px solid var(--red); transform:rotate(14deg);}

  .card-footer{
    flex:0 0 auto;
    padding:10px 16px 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .card-footer span{font-size:10px; color:#6f89b3;}

  /* Action buttons */
  .actions{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:14px 16px 10px;
    z-index:20;
  }
  .act-btn{
    width:56px;height:56px;
    border-radius:50%;
    border:none;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(0,0,0,0.4);
    transition:transform .12s ease;
  }
  .act-btn:active{transform:scale(0.88);}
  .act-reject{background:rgba(255,84,112,0.16); border:2px solid var(--red); color:var(--red);}
  .act-edit{
    width:44px;height:44px;
    background:rgba(79,176,255,0.14); border:2px solid var(--blue); color:var(--blue);
    font-size:17px;
  }
  .act-adopt{background:rgba(61,220,132,0.16); border:2px solid var(--green); color:var(--green);}

  .hint{
    flex:0 0 auto;
    text-align:center;
    font-size:10px;
    color:#6f89b3;
    padding-bottom:10px;
  }

  /* Summary screen */
  .summary{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
    padding:20px 20px 24px;
    z-index:30;
    background:linear-gradient(180deg, rgba(10,15,22,0.4), rgba(10,15,22,0.97) 30%);
    overflow-y:auto;
  }
  .summary.show{display:flex;}
  .summary-hero{
    text-align:center;
    padding:20px 10px 16px;
  }
  .summary-hero .big{font-size:44px;}
  .summary-hero h2{font-size:20px; font-weight:800; color:#fff; margin:8px 0 4px;}
  .summary-hero p{font-size:12px; color:#9db4d6; margin:0;}
  .summary-stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin:14px 0;
  }
  .stat-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
  }
  .stat-card .num{font-size:22px; font-weight:900;}
  .stat-card.adopt .num{color:var(--green);}
  .stat-card.reject .num{color:var(--red);}
  .stat-card.edit .num{color:var(--blue);}
  .stat-card .lbl{font-size:9.5px; color:#9db4d6; margin-top:2px;}
  .summary-total{
    background:linear-gradient(135deg, rgba(255,138,61,0.18), rgba(22,48,110,0.4));
    border:1px solid rgba(255,138,61,0.4);
    border-radius:14px;
    padding:16px;
    text-align:center;
    margin-bottom:14px;
  }
  .summary-total .label{font-size:11px; color:#ffd4b3;}
  .summary-total .amount{font-size:30px; font-weight:900; color:#fff; margin-top:4px;}
  .summary-list{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:14px;
  }
  .sum-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    font-size:12px;
  }
  .sum-row .mark{width:16px; flex:0 0 auto; font-weight:900;}
  .sum-row.a .mark{color:var(--green);}
  .sum-row.r .mark{color:var(--red); text-decoration:line-through; opacity:.5;}
  .sum-row.r{opacity:.5;}
  .sum-row .nm{flex:1 1 auto; color:#eaf2ff;}
  .sum-row .pr{color:var(--orange); font-weight:700;}
  .btn-primary{
    flex:0 0 auto;
    background:linear-gradient(135deg, var(--orange), #ff6a3d);
    border:none;
    color:#1a0e04;
    font-weight:800;
    font-size:15px;
    padding:15px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 24px rgba(255,138,61,0.35);
  }
</style>
</head>
<body>
<div class="device" id="device">

  <header>
    <svg class="logo-hex" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,4 93,27 93,73 50,96 7,73 7,27" fill="none" stroke="#4fb0ff" stroke-width="4"/>
      <polygon points="50,16 82,33.5 82,66.5 50,84 18,66.5 18,33.5" fill="none" stroke="#ff8a3d" stroke-width="3"/>
      <line x1="50" y1="38" x2="50" y2="62" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <line x1="38" y1="50" x2="62" y2="50" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="brand-text">
      <div class="name">GENBA</div>
      <div class="catch">現場が、経営を超えていく。</div>
    </div>
    <div class="header-count"><b id="idxLabel">1</b> / <span id="totalLabel">10</span> 枚</div>
  </header>

  <div class="dots" id="dots"></div>

  <div class="stage" id="stage">
    <!-- cards injected by JS -->
  </div>

  <div class="actions" id="actions">
    <button class="act-btn act-reject" id="btnReject">✗</button>
    <button class="act-btn act-edit" id="btnEdit">✎</button>
    <button class="act-btn act-adopt" id="btnAdopt">✓</button>
  </div>
  <div class="hint">← 左スワイプで除外／右スワイプで採用／タップで修正 →</div>

  <div class="summary" id="summary">
    <div class="summary-hero">
      <div class="big">🎉</div>
      <h2>拾い出しレビュー完了</h2>
      <p>全10枚のレビューが終わりました</p>
    </div>
    <div class="summary-stats">
      <div class="stat-card adopt"><div class="num" id="statAdopt">0</div><div class="lbl">採用</div></div>
      <div class="stat-card reject"><div class="num" id="statReject">0</div><div class="lbl">除外</div></div>
      <div class="stat-card edit"><div class="num" id="statEdit">0</div><div class="lbl">要修正</div></div>
    </div>
    <div class="summary-total">
      <div class="label">採用済み合計金額（概算）</div>
      <div class="amount" id="statTotal">¥0</div>
    </div>
    <div class="summary-list" id="summaryList"></div>
    <div class="btn-primary" id="btnNext">見積書に反映する →</div>
  </div>

</div>

<script>
const items = [
  {cat:"躯体", conf:"high", icon:"🧱", name:"型枠支保工 一式", source:"図面 A-03 / 柱伏図より抽出", qty:"1式", unit:"—", price:"¥480,000"},
  {cat:"仮設", conf:"high", icon:"🏗️", name:"足場架設（外部）", source:"図面 A-01 / 立面図より抽出", qty:"320㎡", unit:"@1,200円", price:"¥384,000"},
  {cat:"電気", conf:"mid",  icon:"💡", name:"LED照明器具 天井埋込", source:"図面 E-02 / 電気設備図より抽出", qty:"48台", unit:"@8,500円", price:"¥408,000"},
  {cat:"設備", conf:"high", icon:"🚰", name:"給排水管配管一式", source:"図面 P-01 / 配管系統図より抽出", qty:"1式", unit:"—", price:"¥620,000"},
  {cat:"内装", conf:"mid",  icon:"🎨", name:"クロス張り（壁面）", source:"図面 A-05 / 仕上表より抽出", qty:"860㎡", unit:"@1,100円", price:"¥946,000"},
  {cat:"躯体", conf:"low",  icon:"🪨", name:"コンクリート打設 基礎部", source:"図面 S-02 / 構造図より抽出", qty:"210㎥", unit:"@18,000円", price:"¥3,780,000"},
  {cat:"外構", conf:"high", icon:"🌳", name:"植栽工事 一式", source:"図面 L-01 / 外構図より抽出", qty:"1式", unit:"—", price:"¥260,000"},
  {cat:"電気", conf:"mid",  icon:"🔌", name:"コンセント・スイッチ類", source:"図面 E-03 / 電気設備図より抽出", qty:"96箇所", unit:"@3,200円", price:"¥307,200"},
  {cat:"内装", conf:"high", icon:"🚪", name:"建具工事（室内ドア）", source:"図面 A-06 / 建具表より抽出", qty:"22枚", unit:"@42,000円", price:"¥924,000"},
  {cat:"仮設", conf:"low",  icon:"🚧", name:"仮囲い・養生一式", source:"図面 A-01 / 配置図より抽出", qty:"1式", unit:"—", price:"¥180,000"},
];

let idx = 0;
const decisions = new Array(items.length).fill(null); // 'adopt' | 'reject' | 'edit'

const stage = document.getElementById('stage');
const dotsWrap = document.getElementById('dots');
const idxLabel = document.getElementById('idxLabel');
const totalLabel = document.getElementById('totalLabel');
totalLabel.textContent = items.length;

function confLabel(c){
  if(c === 'high') return {cls:'high', text:'確信度 高'};
  if(c === 'mid') return {cls:'mid', text:'確信度 中'};
  return {cls:'', text:'確信度 低'};
}

function buildDots(){
  dotsWrap.innerHTML = '';
  items.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    if(decisions[i]) d.classList.add('done');
    if(i === idx) d.classList.add('current');
    dotsWrap.appendChild(d);
  });
}

function makeCardEl(item, i){
  const conf = confLabel(item.conf);
  const el = document.createElement('div');
  el.className = 'card';
  el.style.zIndex = 100 - i;
  el.innerHTML = `
    <div class="cat-strip">
      <span class="cat-tag">${item.cat}</span>
      <span class="conf-tag ${conf.cls}">${conf.text}</span>
    </div>
    <div class="card-body">
      <div class="item-icon">${item.icon}</div>
      <div class="item-name">${item.name}</div>
      <div class="item-source">📄 ${item.source}</div>
      <div class="spec-grid">
        <div class="spec-box"><div class="label">数量</div><div class="value">${item.qty}</div></div>
        <div class="spec-box"><div class="label">単価</div><div class="value">${item.unit}</div></div>
      </div>
      <div class="thumb-area">図面プレビュー（サムネイル）</div>
    </div>
    <div class="stamp adopt">採用</div>
    <div class="stamp reject">除外</div>
    <div class="card-footer"><span>金額目安 ${item.price}</span></div>
  `;
  return el;
}

let renderedCards = []; // {el, idx}

function renderStage(){
  stage.innerHTML = '';
  renderedCards = [];
  const visibleCount = 3;
  for(let k = visibleCount - 1; k >= 0; k--){
    const i = idx + k;
    if(i >= items.length) continue;
    const el = makeCardEl(items[i], k);
    if(k === 0){
      el.style.transform = 'translateY(0) scale(1)';
      el.style.opacity = '1';
      attachSwipe(el, i);
    } else {
      el.style.transform = `translateY(${k*8}px) scale(${1 - k*0.04})`;
      el.style.opacity = `${1 - k*0.25}`;
    }
    stage.appendChild(el);
    renderedCards.push({el, idx:i});
  }
  idxLabel.textContent = Math.min(idx+1, items.length);
  buildDots();
}

function attachSwipe(el, i){
  let startX = 0, startY = 0, curX = 0, curY = 0, dragging = false;
  const stampA = el.querySelector('.stamp.adopt');
  const stampR = el.querySelector('.stamp.reject');

  function onDown(x, y){
    dragging = true;
    startX = x; startY = y;
    el.style.transition = 'none';
  }
  function onMove(x, y){
    if(!dragging) return;
    curX = x - startX;
    curY = y - startY;
    const rot = curX / 18;
    el.style.transform = `translate(${curX}px, ${curY*0.4}px) rotate(${rot}deg)`;
    const p = Math.min(Math.abs(curX) / 100, 1);
    if(curX > 0){ stampA.style.opacity = p; stampR.style.opacity = 0; }
    else { stampR.style.opacity = p; stampA.style.opacity = 0; }
  }
  function onUp(){
    if(!dragging) return;
    dragging = false;
    el.style.transition = 'transform .3s cubic-bezier(.2,.8,.3,1)';
    if(curX > 90){
      decide(i, 'adopt', el);
    } else if(curX < -90){
      decide(i, 'reject', el);
    } else {
      el.style.transform = 'translate(0,0) rotate(0)';
      stampA.style.opacity = 0; stampR.style.opacity = 0;
    }
    curX = 0; curY = 0;
  }

  el.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onUp);

  el.addEventListener('touchstart', e => { const t = e.touches[0]; onDown(t.clientX, t.clientY); }, {passive:true});
  el.addEventListener('touchmove', e => { const t = e.touches[0]; onMove(t.clientX, t.clientY); }, {passive:true});
  el.addEventListener('touchend', onUp);

  el.addEventListener('click', e => {
    if(Math.abs(curX) < 4){
      openEdit(i);
    }
  });
}

function decide(i, type, el){
  decisions[i] = type;
  const dx = type === 'adopt' ? 500 : -500;
  const rot = type === 'adopt' ? 24 : -24;
  el.style.transform = `translate(${dx}px, -40px) rotate(${rot}deg)`;
  el.style.opacity = '0';
  setTimeout(() => {
    idx++;
    if(idx >= items.length){
      showSummary();
    } else {
      renderStage();
    }
  }, 260);
}

function openEdit(i){
  if(decisions[i] === null){
    // simple confirm-style flow: mark as edit then advance
    const el = renderedCards.find(c => c.idx === i)?.el;
    if(el){
      el.style.transition = 'transform .25s ease';
      el.style.transform = 'scale(0.94)';
      setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
    }
    decisions[i] = 'edit';
    setTimeout(() => {
      idx++;
      if(idx >= items.length){
        showSummary();
      } else {
        renderStage();
      }
    }, 220);
  }
}

document.getElementById('btnAdopt').addEventListener('click', () => {
  if(idx >= items.length) return;
  const cur = renderedCards.find(c => c.idx === idx)?.el;
  if(cur) decide(idx, 'adopt', cur);
});
document.getElementById('btnReject').addEventListener('click', () => {
  if(idx >= items.length) return;
  const cur = renderedCards.find(c => c.idx === idx)?.el;
  if(cur) decide(idx, 'reject', cur);
});
document.getElementById('btnEdit').addEventListener('click', () => {
  if(idx >= items.length) return;
  openEdit(idx);
});

function parsePrice(s){
  return parseInt(s.replace(/[^0-9]/g,''), 10) || 0;
}

function showSummary(){
  document.getElementById('actions').style.display = 'none';
  document.querySelector('.hint').style.display = 'none';
  const summary = document.getElementById('summary');
  summary.classList.add('show');

  let adoptCount = 0, rejectCount = 0, editCount = 0, total = 0;
  const listEl = document.getElementById('summaryList');
  listEl.innerHTML = '';
  items.forEach((item, i) => {
    const d = decisions[i] || 'reject';
    if(d === 'adopt'){ adoptCount++; total += parsePrice(item.price); }
    else if(d === 'reject'){ rejectCount++; }
    else if(d === 'edit'){ editCount++; total += parsePrice(item.price); }

    const row = document.createElement('div');
    row.className = 'sum-row ' + (d === 'adopt' ? 'a' : d === 'reject' ? 'r' : 'e');
    const mark = d === 'adopt' ? '✓' : d === 'reject' ? '✗' : '✎';
    row.innerHTML = `<span class="mark">${mark}</span><span class="nm">${item.name}</span><span class="pr">${item.price}</span>`;
    listEl.appendChild(row);
  });

  document.getElementById('statAdopt').textContent = adoptCount;
  document.getElementById('statReject').textContent = rejectCount;
  document.getElementById('statEdit').textContent = editCount;
  document.getElementById('statTotal').textContent = '¥' + total.toLocaleString();
}

document.getElementById('btnNext').addEventListener('click', () => {
  document.getElementById('btnNext').textContent = '反映しました ✓';
});

renderStage();
</script>
</body>
</html>
