<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GENBA — マインドマップ配線図UI</title>
<style>
  :root{
    --ai:#16306e;
    --blue:#4fb0ff;
    --orange:#ff8a3d;
    --bg:#0a0f16;
    --line:rgba(79,176,255,0.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg);
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    color:#eaf2ff;
    overflow:hidden;
  }
  #stage{
    position:relative;
    width:100%;
    height:100%;
    max-width:390px;
    margin:0 auto;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:28px 28px;
    background-color:var(--bg);
    overflow:hidden;
  }
  /* header */
  .topbar{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:center;gap:10px;
    padding:14px 16px 10px;
    z-index:20;
    background:linear-gradient(180deg, rgba(10,15,22,0.95), rgba(10,15,22,0));
  }
  .logo-hex{width:34px;height:34px;flex:none;}
  .brand{
    font-size:15px;font-weight:700;letter-spacing:2px;color:#fff;
  }
  .brand small{
    display:block;font-size:9px;font-weight:400;letter-spacing:1px;color:var(--blue);margin-top:1px;
  }
  .backbtn{
    margin-left:auto;
    display:none;
    align-items:center;justify-content:center;
    width:48px;height:48px;
    border-radius:50%;
    background:rgba(22,48,110,0.6);
    border:1px solid var(--blue);
    color:#fff;font-size:20px;
    cursor:pointer;
  }
  .backbtn.show{display:flex;}

  /* svg wiring layer */
  svg#wires{
    position:absolute;inset:0;width:100%;height:100%;
    pointer-events:none;
    z-index:1;
  }
  .wire{
    fill:none;
    stroke:var(--blue);
    stroke-width:2;
    stroke-dasharray:4 4;
    opacity:0.55;
    animation:dash 6s linear infinite;
  }
  .wire.sub{
    stroke:var(--orange);
  }
  @keyframes dash{ to{ stroke-dashoffset:-40; } }

  /* nodes layer */
  .layer{
    position:absolute;inset:0;
    z-index:5;
    transition:opacity 0.35s ease, transform 0.35s ease;
  }
  .layer.hidden{
    opacity:0;
    pointer-events:none;
    transform:scale(0.9);
  }

  .node{
    position:absolute;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;
    user-select:none;
    transform:translate(-50%,-50%);
  }
  .node .hex{
    position:relative;
    display:flex;align-items:center;justify-content:center;
    filter:drop-shadow(0 0 6px rgba(79,176,255,0.25));
  }
  .node .label{
    margin-top:6px;
    font-size:11px;
    font-weight:600;
    color:#dceaff;
    white-space:nowrap;
    text-align:center;
  }
  .node .sub-label{
    font-size:9px;
    color:var(--blue);
    margin-top:1px;
  }
  .node:active .hex{ filter:brightness(1.3); }

  /* center node (案件) */
  .node.center .hex{ width:104px;height:104px; }
  .node.center .label{ font-size:13px; font-weight:700; }

  /* function nodes */
  .node.func .hex{ width:76px;height:76px; }

  /* child nodes */
  .node.child .hex{ width:64px;height:64px; }
  .node.child .label{ font-size:10px; }

  .pulse{
    position:absolute;
    top:50%;left:50%;
    width:10px;height:10px;
    margin:-5px 0 0 -5px;
    border-radius:50%;
    background:var(--orange);
    box-shadow:0 0 8px var(--orange);
  }

  .badge{
    position:absolute;
    top:-4px;right:-4px;
    background:var(--orange);
    color:#20120a;
    font-size:9px;font-weight:700;
    padding:2px 5px;
    border-radius:8px;
    line-height:1.2;
  }

  .breadcrumb{
    position:absolute;
    top:60px;left:0;right:0;
    text-align:center;
    z-index:20;
    font-size:11px;
    color:var(--blue);
    letter-spacing:1px;
    pointer-events:none;
  }

  .hint{
    position:absolute;
    bottom:14px;left:0;right:0;
    text-align:center;
    font-size:10px;
    color:#5c7699;
    z-index:20;
    pointer-events:none;
  }

  /* detail panel for leaf taps */
  .detail-sheet{
    position:absolute;
    left:0;right:0;bottom:0;
    background:linear-gradient(180deg, rgba(22,48,110,0.97), rgba(10,15,22,0.99));
    border-top:2px solid var(--blue);
    border-radius:18px 18px 0 0;
    padding:18px 20px 26px;
    transform:translateY(100%);
    transition:transform 0.3s ease;
    z-index:30;
    box-shadow:0 -8px 24px rgba(0,0,0,0.5);
  }
  .detail-sheet.show{ transform:translateY(0); }
  .detail-sheet h3{
    margin:0 0 6px;font-size:15px;color:#fff;
    display:flex;align-items:center;gap:8px;
  }
  .detail-sheet p{
    margin:0 0 14px;font-size:12px;color:#a9c4e8;line-height:1.6;
  }
  .detail-sheet .actbtn{
    display:block;width:100%;
    padding:14px;
    min-height:48px;
    background:var(--orange);
    color:#241207;
    font-weight:700;font-size:14px;
    border:none;border-radius:10px;
    text-align:center;
  }
  .sheet-close{
    position:absolute;top:10px;right:14px;
    width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;
    color:#9db6db;font-size:18px;cursor:pointer;
  }
</style>
</head>

    </div>
    <div class="node child" style="top:20%;left:30%;" onclick="openDetail('テキストメモ','気づいた点をすぐにメモできます。')">
      <div class="hex"><svg width="64" height="64" viewBox="0 0 100 100"><polygon points="50,6 91,28 91,72 50,94 9,72 9,28" fill="#0e1c3f" stroke="#4fb0ff" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-size="26">✏️</text></svg></div>
      <div class="label">テキスト</div>
    </div>
    <div class="node child" style="top:20%;left:70%;" onclick="openDetail('図面に書き込み','図面上に直接手書きで注記できます。')">
      <div class="hex"><svg width="64" height="64" viewBox="0 0 100 100"><polygon points="50,6 91,28 91,72 50,94 9,72 9,28" fill="#0e1c3f" stroke="#4fb0ff" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-size="26">✍️</text></svg></div>
      <div class="label">図面注記</div>
    </div>
    <div class="node child" style="top:82%;left:50%;" onclick="openDetail('共有','社内チャットへメモを即共有します。')">
      <div class="hex"><svg width="64" height="64" viewBox="0 0 100 100"><polygon points="50,6 91,28 91,72 50,94 9,72 9,28" fill="#0e1c3f" stroke="#4fb0ff" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-size="26">📤</text></svg></div>
      <div class="label">共有</div>
    </div>
  </div>

  <!-- detail sheet -->
  <div class="detail-sheet" id="detailSheet">
    <div class="sheet-close" onclick="closeDetail()">✕</div>
    <h3 id="detailTitle">タイトル</h3>
    <p id="detailBody">説明文</p>
    <button class="actbtn" onclick="closeDetail()">この項目を開く</button>
  </div>

  <div class="hint" id="hint">タップして潜る / 戻るボタンで浮上</div>
</div>

<script>
const stage = document.getElementById('stage');
const wiresSvg = document.getElementById('wires');
const backBtn = document.getElementById('backBtn');
const breadcrumb = document.getElementById('breadcrumb');
let currentLayer = 'layer0';
const rootLabels = {
  'layer-estimate':'案件 ▸ 見積',
  'layer-photo':'案件 ▸ 写真',
  'layer-doc':'案件 ▸ 書類',
  'layer-attend':'案件 ▸ 勤怠',
  'layer-material':'案件 ▸ 材料',
  'layer-note':'案件 ▸ 現場メモ'
};

function pct(el, prop){
  const v = el.style[prop];
  return parseFloat(v)/100;
}

function drawWires(layerId){
  wiresSvg.innerHTML = '';
  const w = stage.clientWidth, h = stage.clientHeight;
  wiresSvg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  const layer = document.getElementById(layerId);
  if(!layer) return;
  const nodes = layer.querySelectorAll('.node');
  if(nodes.length === 0) return;
  // first node = hub (center or function-back node)
  const hub = nodes[0];
  const hx = pct(hub,'left') * w, hy = pct(hub,'top') * h;
  nodes.forEach((n, i) => {
    if(i === 0) return;
    const nx = pct(n,'left') * w, ny = pct(n,'top') * h;
    const midY = (hy + ny) / 2;
    const path = `M ${hx} ${hy} L ${hx} ${midY} L ${nx} ${midY} L ${nx} ${ny}`;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', path);
    p.setAttribute('class', layerId === 'layer0' ? 'wire' : 'wire sub');
    wiresSvg.appendChild(p);
  });
}

function showLayer(id){
  document.querySelectorAll('.layer').forEach(l => l.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  currentLayer = id;
  drawWires(id);
  if(id === 'layer0'){
    backBtn.classList.remove('show');
    breadcrumb.textContent = '案件マインドマップ';
  } else {
    backBtn.classList.add('show');
    breadcrumb.textContent = rootLabels[id] || '';
  }
}

function enterFunc(key){
  showLayer('layer-' + key);
}
function goBack(){
  showLayer('layer0');
}

function openDetail(title, body){
  document.getElementById('detailTitle').textContent = title;
  document.getElementById('detailBody').textContent = body;
  document.getElementById('detailSheet').classList.add('show');
}
function closeDetail(){
  document.getElementById('detailSheet').classList.remove('show');
}

window.addEventListener('resize', () => drawWires(currentLayer));
window.addEventListener('load', () => drawWires('layer0'));
</script>
</body>
</html>
