<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GENBA — チャット型UI プロトタイプ</title>
<style>
  :root{
    --ai:#16306e;
    --blue:#4fb0ff;
    --orange:#ff8a3d;
    --bg:#0a0f16;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(79,176,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,176,255,0.10) 1px, transparent 1px);
    background-size:28px 28px;
    color:#eaf2ff;
    display:flex;
    justify-content:center;
  }
  .device{
    width:390px;
    max-width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg, rgba(10,15,22,0.2), rgba(10,15,22,0.9) 40%);
    position:relative;
    overflow:hidden;
  }

  /* Header */
  header{
    flex:0 0 auto;
    padding:14px 16px 12px;
    display:flex;
    align-items:center;
    gap:10px;
    border-bottom:1px solid rgba(79,176,255,0.25);
    background:rgba(10,15,22,0.85);
    backdrop-filter:blur(4px);
    z-index:5;
  }
  .logo-hex{width:40px;height:40px;flex:0 0 auto;}
  .brand-text{display:flex;flex-direction:column;line-height:1.2;}
  .brand-text .name{font-weight:800;font-size:16px;letter-spacing:0.06em;color:#fff;}
  .brand-text .catch{font-size:10px;color:var(--blue);letter-spacing:0.03em;}
  .status-dot{
    margin-left:auto;
    width:9px;height:9px;border-radius:50%;
    background:var(--blue);
    box-shadow:0 0 8px var(--blue);
    flex:0 0 auto;
  }

  /* Chat area */
  .chat{
    flex:1 1 auto;
    overflow-y:auto;
    padding:16px 12px 16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    scroll-behavior:smooth;
  }
  .row{display:flex; gap:8px; align-items:flex-end; animation:rise 0.35s ease;}
  .row.user{justify-content:flex-end;}
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .avatar{
    width:30px;height:30px;flex:0 0 auto;border-radius:8px;
    background:var(--ai);
    display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(79,176,255,0.4);
  }
  .avatar svg{width:18px;height:18px;}
  .bubble{
    max-width:75%;
    padding:10px 14px;
    border-radius:16px;
    font-size:14px;
    line-height:1.55;
    word-break:break-word;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
  }
  .row.ai .bubble{
    background:#132449;
    border:1px solid rgba(79,176,255,0.3);
    border-bottom-left-radius:4px;
    color:#eaf2ff;
  }
  .row.user .bubble{
    background:var(--blue);
    color:#06121f;
    font-weight:600;
    border-bottom-right-radius:4px;
  }
  .timestamp{
    font-size:9px;
    color:#5c7191;
    margin:0 4px;
    align-self:flex-end;
  }

  /* Choice chips */
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding-left:38px;
    margin-top:-4px;
  }
  .chip{
    min-height:48px;
    padding:0 16px;
    display:flex;
    align-items:center;
    gap:6px;
    border-radius:24px;
    border:1.5px solid var(--blue);
    background:rgba(79,176,255,0.08);
    color:#dcefff;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.15s ease;
    user-select:none;
  }
  .chip:active{transform:scale(0.95); background:rgba(79,176,255,0.3);}
  .chip.orange{border-color:var(--orange); color:#ffe1cb;}
  .chip.orange:active{background:rgba(255,138,61,0.3);}
  .chip .ico{font-size:15px;}

  .typing{
    display:flex; gap:4px; align-items:center;
    padding:12px 14px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--blue);
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{
    0%,80%,100%{opacity:0.2; transform:scale(0.8);}
    40%{opacity:1; transform:scale(1);}
  }

  /* Input bar */
  .inputbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:rgba(10,15,22,0.95);
    border-top:1px solid rgba(79,176,255,0.25);
    z-index:5;
  }
  .inputbar input{
    flex:1;
    height:48px;
    border-radius:24px;
    border:1.5px solid rgba(79,176,255,0.3);
    background:#0f1826;
    color:#eaf2ff;
    padding:0 16px;
    font-size:14px;
    outline:none;
  }
  .inputbar input:focus{border-color:var(--blue);}
  .iconbtn{
    width:48px;height:48px;flex:0 0 auto;
    border-radius:50%;
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:19px;
  }
  .mic{
    background:rgba(255,138,61,0.15);
    border:1.5px solid var(--orange);
    color:var(--orange);
    transition:all 0.15s ease;
  }
  .mic.recording{
    background:var(--orange);
    color:#1a0f06;
    box-shadow:0 0 0 6px rgba(255,138,61,0.25);
  }
  .send{
    background:var(--blue);
    color:#06121f;
  }
  .send:active, .mic:active{transform:scale(0.92);}

  /* scrollbar hide */
  .chat::-webkit-scrollbar{width:4px;}
  .chat::-webkit-scrollbar-thumb{background:rgba(79,176,255,0.3); border-radius:4px;}
</style>
</head>
<body>
<div class="device">

  <header>
    <svg class="logo-hex" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <polygon points="30,3 54,16.5 54,43.5 30,57 6,43.5 6,16.5" fill="none" stroke="#4fb0ff" stroke-width="2.5"/>
      <polygon points="30,11 47,20.5 47,39.5 30,49 13,39.5 13,20.5" fill="none" stroke="#ff8a3d" stroke-width="1.8"/>
      <line x1="30" y1="22" x2="30" y2="38" stroke="#eaf2ff" stroke-width="3" stroke-linecap="round"/>
      <line x1="22" y1="30" x2="38" y2="30" stroke="#eaf2ff" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div class="brand-text">
      <span class="name">GENBA</span>
      <span class="catch">現場が、経営を超えていく。</span>
    </div>
    <div class="status-dot"></div>
  </header>

  <div class="chat" id="chat"></div>

  <div class="inputbar">
    <button class="iconbtn mic" id="micBtn" title="音声入力">🎤</button>
    <input type="text" id="textInput" placeholder="メッセージを入力...">
    <button class="iconbtn send" id="sendBtn" title="送信">➤</button>
  </div>
</div>

<script>
(function(){
  const chat = document.getElementById('chat');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');

  const aiAvatar = `<svg viewBox="0 0 60 60"><polygon points="30,5 52,17 52,41 30,53 8,41 8,17" fill="none" stroke="#4fb0ff" stroke-width="3"/><line x1="30" y1="22" x2="30" y2="38" stroke="#fff" stroke-width="3" stroke-linecap="round"/><line x1="22" y1="30" x2="38" y2="30" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>`;

  function nowStr(){
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function scrollBottom(){
    chat.scrollTop = chat.scrollHeight;
  }

  function addAiMessage(text, cb){
    const row = document.createElement('div');
    row.className = 'row ai';
    row.innerHTML = `<div class="avatar">${aiAvatar}</div><div class="typing"><span></span><span></span><span></span></div>`;
    chat.appendChild(row);
    scrollBottom();
    setTimeout(()=>{
      row.innerHTML = `<div class="avatar">${aiAvatar}</div><div class="bubble"></div><span class="timestamp">${nowStr()}</span>`;
      row.querySelector('.bubble').textContent = text;
      scrollBottom();
      if(cb) cb();
    }, 550);
  }

  function addUserMessage(text){
    const row = document.createElement('div');
    row.className = 'row user';
    row.innerHTML = `<span class="timestamp">${nowStr()}</span><div class="bubble"></div>`;
    row.querySelector('.bubble').textContent = text;
    chat.appendChild(row);
    scrollBottom();
  }

  function addChips(options, orange){
    const wrap = document.createElement('div');
    wrap.className = 'chips';
    options.forEach(opt=>{
      const chip = document.createElement('div');
      chip.className = 'chip' + (orange ? ' orange' : '');
      chip.innerHTML = `<span class="ico">${opt.icon||''}</span><span>${opt.label}</span>`;
      chip.onclick = ()=>{
        wrap.remove();
        addUserMessage(opt.label);
        setTimeout(()=> opt.next(), 250);
      };
      wrap.appendChild(chip);
    });
    chat.appendChild(wrap);
    scrollBottom();
  }

  // --- 会話ツリー定義 ---
  function stepGreeting(){
    addAiMessage('おはようございます。今日の現場は？', ()=>{
      addChips([
        {label:'佐藤様邸', icon:'🏠', next: ()=>stepAction('佐藤様邸')},
        {label:'新規案件', icon:'🆕', next: ()=>stepAction('新規案件')},
      ]);
    });
  }

  function stepAction(siteName){
    addAiMessage(`${siteName}ですね。何をしますか？`, ()=>{
      addChips([
        {label:'見積', icon:'📋', next: ()=>stepEstimate(siteName)},
        {label:'写真', icon:'📷', next: ()=>stepPhoto(siteName)},
        {label:'日報', icon:'📝', next: ()=>stepReport(siteName)},
      ]);
    });
  }

  function stepEstimate(siteName){
    addAiMessage('見積を作成します。工事の種類を選んでください。', ()=>{
      addChips([
        {label:'内装工事', icon:'🧱', next: ()=>stepEstimateDetail(siteName,'内装工事')},
        {label:'電気設備', icon:'⚡', next: ()=>stepEstimateDetail(siteName,'電気設備')},
        {label:'外構工事', icon:'🌳', next: ()=>stepEstimateDetail(siteName,'外構工事')},
      ]);
    });
  }

  function stepEstimateDetail(siteName, kind){
    addAiMessage(`${kind}の見積ですね。過去の類似案件から自動算出します...`, ()=>{
      addAiMessage(`${siteName}『${kind}』の概算見積：￥1,280,000（税込）\n下書きを保存しました。編集しますか？`, ()=>{
        addChips([
          {label:'このまま送付', icon:'📤', next: ()=>endFlow('見積を送付しました。お疲れさまでした！')},
          {label:'金額を編集', icon:'✏️', next: ()=>endFlow('編集画面（ダミー）を開きました。')},
        ]);
      });
    });
  }

  function stepPhoto(siteName){
    addAiMessage(`${siteName}の写真を記録します。撮影しますか？アルバムから選びますか？`, ()=>{
      addChips([
        {label:'カメラ起動', icon:'📸', next: ()=>endFlow('カメラを起動しました（ダミー）。撮影後、自動でタグ付けされます。')},
        {label:'アルバムから選択', icon:'🖼️', next: ()=>endFlow('アルバムを開きました（ダミー）。')},
      ]);
    });
  }

  function stepReport(siteName){
    addAiMessage(`${siteName}の日報を作成します。本日の進捗はいかがですか？`, ()=>{
      addChips([
        {label:'予定通り', icon:'✅', next: ()=>endFlow('日報に「予定通り進行」と記録しました。')},
        {label:'遅延あり', icon:'⚠️', next: ()=>stepDelayReason(siteName)},
      ]);
    });
  }

  function stepDelayReason(siteName){
    addAiMessage('遅延の理由を教えてください。', ()=>{
      addChips([
        {label:'天候不良', icon:'🌧️', next: ()=>endFlow('日報に「天候不良により遅延」と記録しました。')},
        {label:'資材遅延', icon:'📦', next: ()=>endFlow('日報に「資材遅延」と記録し、発注担当へ通知しました。')},
      ]);
    });
  }

  function endFlow(msg){
    addAiMessage(msg, ()=>{
      addAiMessage('他にも手伝えることはありますか？', ()=>{
        addChips([
          {label:'最初に戻る', icon:'🔁', next: ()=> stepGreeting()},
        ]);
      });
    });
  }

  // --- テキスト/マイク入力（ダミー応答） ---
  function handleFreeText(text){
    if(!text.trim()) return;
    addUserMessage(text);
    textInput.value = '';
    setTimeout(()=>{
      addAiMessage('承知しました。担当者に確認して折り返しますね。', ()=>{
        addChips([
          {label:'最初に戻る', icon:'🔁', next: ()=> stepGreeting()},
        ]);
      });
    }, 300);
  }

  sendBtn.addEventListener('click', ()=> handleFreeText(textInput.value));
  textInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') handleFreeText(textInput.value);
  });

  let recording = false;
  micBtn.addEventListener('click', ()=>{
    recording = !recording;
    micBtn.classList.toggle('recording', recording);
    if(recording){
      micBtn.textContent = '●';
      setTimeout(()=>{
        if(!recording) return;
        recording = false;
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎤';
        handleFreeText('（音声）明日は10時から作業開始します');
      }, 1400);
    } else {
      micBtn.textContent = '🎤';
    }
  });

  // 起動
  stepGreeting();
})();
</script>
</body>
</html>
