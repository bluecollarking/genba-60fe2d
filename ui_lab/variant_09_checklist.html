<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GENBA — 今日やることチェックリスト プロトタイプ</title>
<style>
  :root{
    --ai:#16306e;
    --blue:#4fb0ff;
    --orange:#ff8a3d;
    --bg:#0a0f16;
    --green:#3ddc84;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(79,176,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,176,255,0.10) 1px, transparent 1px);
    background-size:28px 28px;
    color:#eaf2ff;
    display:flex;
    justify-content:center;
  }
  .device{
    width:390px;
    max-width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(10,15,22,0.15), rgba(10,15,22,0.92) 40%);
  }

  /* Header — 朝礼ボード風 */
  header{
    flex:0 0 auto;
    padding:14px 16px 12px;
    display:flex;
    align-items:center;
    gap:10px;
    border-bottom:2px solid var(--orange);
    background:
      repeating-linear-gradient(135deg, rgba(255,138,61,0.08) 0 10px, transparent 10px 20px),
      rgba(10,15,22,0.9);
    z-index:5;
  }
  .logo-hex{width:38px;height:38px;flex:0 0 auto;}
  .brand-text{display:flex;flex-direction:column;line-height:1.2;}
  .brand-text .name{font-weight:800;font-size:15px;letter-spacing:0.06em;color:#fff;}
  .brand-text .catch{font-size:9.5px;color:var(--blue);letter-spacing:0.02em;}

  .ring-wrap{margin-left:auto;position:relative;width:46px;height:46px;flex:0 0 auto;}
  .ring-wrap svg{width:46px;height:46px;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:rgba(255,255,255,0.12);stroke-width:5;}
  .ring-fg{fill:none;stroke:var(--orange);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease;}
  .ring-label{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;color:#fff;
  }

  /* Board strip */
  .board-strip{
    flex:0 0 auto;
    padding:10px 16px 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .site-name{font-size:15px;font-weight:800;color:#fff;}
  .site-date{font-size:11px;color:#9db4d6;}
  .badge-count{
    font-size:11px;font-weight:700;
    background:rgba(79,176,255,0.15);
    border:1px solid rgba(79,176,255,0.4);
    color:var(--blue);
    padding:3px 9px;border-radius:999px;
    white-space:nowrap;
  }

  /* Checklist */
  .board{
    flex:1 1 auto;
    overflow-y:auto;
    padding:6px 14px 90px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .task-card{
    display:flex;
    align-items:center;
    gap:12px;
    min-height:64px;
    padding:10px 14px;
    border-radius:14px;
    background:#101a2c;
    border:1px solid rgba(79,176,255,0.22);
    box-shadow:0 3px 10px rgba(0,0,0,0.35);
    cursor:pointer;
    transition:transform 0.15s ease, background 0.25s ease, border-color 0.25s ease, opacity 0.25s ease;
    position:relative;
    overflow:hidden;
  }
  .task-card:active{transform:scale(0.97);}
  .task-card.done{
    background:#0e1f18;
    border-color:rgba(61,220,132,0.45);
    opacity:0.75;
  }
  .task-card.done::after{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:5px;
    background:var(--green);
  }
  .task-check{
    flex:0 0 auto;
    width:40px;height:40px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,138,61,0.14);
    border:2px solid var(--orange);
    font-size:20px;
    transition:all 0.25s ease;
  }
  .task-card.done .task-check{
    background:var(--green);
    border-color:var(--green);
    color:#06120c;
  }
  .task-icon{font-size:20px;}
  .task-body{flex:1 1 auto; min-width:0;}
  .task-title{font-size:14.5px;font-weight:700;color:#fff;}
  .task-card.done .task-title{
    color:#8fd6ab;
    text-decoration:line-through;
    text-decoration-color:rgba(143,214,171,0.6);
  }
  .task-sub{font-size:11px;color:#8ba3c7;margin-top:2px;}
  .task-arrow{flex:0 0 auto;font-size:18px;color:#5c7191;}
  .task-card.done .task-arrow{visibility:hidden;}

  /* Completion overlay */
  .overlay{
    position:absolute; inset:0;
    background:rgba(6,10,16,0.94);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    gap:16px;
    padding:24px;
    z-index:50;
    opacity:0; pointer-events:none;
    transition:opacity 0.35s ease;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .overlay .big-emoji{font-size:56px; animation:pop 0.6s ease;}
  @keyframes pop{
    0%{transform:scale(0.3); opacity:0;}
    60%{transform:scale(1.15);}
    100%{transform:scale(1); opacity:1;}
  }
  .overlay h2{font-size:20px;font-weight:800;color:#fff;margin:0;}
  .overlay p{font-size:12.5px;color:#9db4d6;margin:0; line-height:1.6;}
  .btn-report{
    margin-top:6px;
    min-height:52px;
    padding:0 26px;
    border-radius:14px;
    border:none;
    background:linear-gradient(135deg, var(--orange), #ffb066);
    color:#2a1000;
    font-weight:800;
    font-size:15px;
    display:flex; align-items:center; gap:8px;
    box-shadow:0 6px 18px rgba(255,138,61,0.4);
  }
  .btn-close{
    margin-top:2px;
    font-size:12px;
    color:#6c85ad;
    background:none;border:none;
    padding:10px;
    text-decoration:underline;
  }

  /* Detail flow overlay */
  .flow{
    position:absolute; inset:0;
    background:var(--bg);
    background-image:
      linear-gradient(rgba(79,176,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,176,255,0.10) 1px, transparent 1px);
    background-size:28px 28px;
    display:flex; flex-direction:column;
    transform:translateX(100%);
    transition:transform 0.32s cubic-bezier(.3,.9,.4,1);
    z-index:40;
  }
  .flow.show{transform:translateX(0);}
  .flow-header{
    flex:0 0 auto;
    display:flex; align-items:center; gap:10px;
    padding:14px 16px;
    border-bottom:1px solid rgba(79,176,255,0.25);
    background:rgba(10,15,22,0.9);
  }
  .flow-back{
    width:40px;height:40px;border-radius:10px;
    background:rgba(79,176,255,0.12);
    border:1px solid rgba(79,176,255,0.3);
    color:var(--blue);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  .flow-title{font-size:15px;font-weight:800;color:#fff;}
  .flow-body{
    flex:1 1 auto;
    padding:24px 20px;
    display:flex; flex-direction:column;
    align-items:center;
    gap:18px;
    overflow-y:auto;
  }
  .flow-icon-big{
    width:88px;height:88px;border-radius:22px;
    background:var(--ai);
    border:2px solid rgba(79,176,255,0.4);
    display:flex;align-items:center;justify-content:center;
    font-size:42px;
    margin-top:10px;
  }
  .flow-desc{font-size:12.5px;color:#9db4d6;text-align:center;line-height:1.7;max-width:280px;}
  .flow-mock{
    width:100%;
    background:#101a2c;
    border:1px solid rgba(79,176,255,0.22);
    border-radius:14px;
    padding:16px;
    display:flex;flex-direction:column;gap:10px;
  }
  .flow-mock-row{
    display:flex;align-items:center;gap:10px;
    font-size:12.5px;color:#cfe0f7;
    padding:8px 10px;
    border-radius:8px;
    background:rgba(79,176,255,0.06);
  }
  .flow-mock-row .dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex:0 0 auto;}
  .flow-footer{
    flex:0 0 auto;
    padding:14px 20px 20px;
  }
  .btn-complete{
    width:100%;
    min-height:52px;
    border-radius:14px;
    border:none;
    background:var(--blue);
    color:#06121f;
    font-weight:800;
    font-size:15px;
  }
  .btn-complete:active{transform:scale(0.98);}
</style>
</head>
<body>
<div class="device" id="device">

  <header>
    <svg class="logo-hex" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,4 93,27 93,73 50,96 7,73 7,27" fill="none" stroke="#4fb0ff" stroke-width="4"/>
      <polygon points="50,16 82,33.5 82,66.5 50,84 18,66.5 18,33.5" fill="none" stroke="#ff8a3d" stroke-width="3"/>
      <line x1="50" y1="38" x2="50" y2="62" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <line x1="38" y1="50" x2="62" y2="50" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <div class="brand-text">
      <div class="name">GENBA</div>
      <div class="catch">現場が、経営を超えていく。</div>
    </div>
    <div class="ring-wrap">
      <svg viewBox="0 0 46 46">
        <circle class="ring-bg" cx="23" cy="23" r="19"></circle>
        <circle class="ring-fg" id="ringFg" cx="23" cy="23" r="19" stroke-dasharray="119.4" stroke-dashoffset="119.4"></circle>
      </svg>
      <div class="ring-label" id="ringLabel">0%</div>
    </div>
  </header>

  <div class="board-strip">
    <div>
      <div class="site-name">🏗️ 大手町re-office新築工事</div>
      <div class="site-date">2026年7月6日（月）朝礼ボード</div>
    </div>
    <div class="badge-count" id="countBadge">0 / 5 完了</div>
  </div>

  <div class="board" id="board">
    <!-- task cards injected by JS -->
  </div>

  <!-- Flow overlay (shared) -->
  <div class="flow" id="flow">
    <div class="flow-header">
      <button class="flow-back" id="flowBack">‹</button>
      <div class="flow-title" id="flowTitle">タスク</div>
    </div>
    <div class="flow-body">
      <div class="flow-icon-big" id="flowIcon">📋</div>
      <div class="flow-desc" id="flowDesc"></div>
      <div class="flow-mock" id="flowMock"></div>
    </div>
    <div class="flow-footer">
      <button class="btn-complete" id="flowCompleteBtn">✓ 完了して現場に戻る</button>
    </div>
  </div>

  <!-- Completion celebration overlay -->
  <div class="overlay" id="overlay">
    <div class="big-emoji">🎉</div>
    <h2>本日の現場完了！</h2>
    <p>すべてのタスクが完了しました。<br>お疲れ様でした。日報を自動生成できます。</p>
    <button class="btn-report" id="reportBtn">📝 日報を自動生成する</button>
    <button class="btn-close" id="closeOverlayBtn">閉じてボードに戻る</button>
  </div>

</div>

<script>
  const tasks = [
    {
      id:'ky', icon:'⚠️', title:'KY記録（危険予知）', sub:'本日作業の危険予知シートを記入',
      flowIcon:'⚠️', desc:'本日の作業内容に対する危険予知（KY）活動を記録します。想定される危険と対策を選択してください。',
      mock:[
        '高所作業：墜落防止措置を確認',
        '重機接近：誘導員配置を確認',
        '感電リスク：仮設配線の絶縁確認'
      ]
    },
    {
      id:'photo', icon:'📸', title:'現場写真', sub:'施工箇所・進捗写真をアップロード',
      flowIcon:'📸', desc:'本日の施工箇所と進捗が分かる写真を撮影し、台帳に登録します。',
      mock:[
        '① 着手前カット：撮影済み',
        '② 施工中カット：撮影待ち',
        '③ 完了カット：未撮影'
      ]
    },
    {
      id:'takeoff', icon:'📐', title:'拾い出し', sub:'資材数量の拾い出しを更新',
      flowIcon:'📐', desc:'図面から必要な資材・数量を拾い出し、発注リストへ反映します。',
      mock:[
        '配管材：拾い出し中',
        '電線・ケーブル：完了',
        '金物・支持材：未着手'
      ]
    },
    {
      id:'report', icon:'📄', title:'日報入力', sub:'作業内容・人員・出来高を記録',
      flowIcon:'📄', desc:'本日の作業内容・投入人員・出来高を入力し、日報下書きを作成します。',
      mock:[
        '作業内容：配線敷設 3F区画',
        '投入人員：4名',
        '出来高：予定比 102%'
      ]
    },
    {
      id:'checkout', icon:'🔒', title:'終業点検', sub:'工具・電源・施錠の最終確認',
      flowIcon:'🔒', desc:'工具の片付け、電源・仮設の遮断、現場の施錠を最終確認します。',
      mock:[
        '電動工具：格納確認',
        '仮設電源：遮断確認',
        '現場ゲート：施錠確認'
      ]
    }
  ];

  const board = document.getElementById('board');
  const state = {};
  tasks.forEach(t => state[t.id] = false);

  function render(){
    board.innerHTML = '';
    tasks.forEach(t => {
      const done = state[t.id];
      const card = document.createElement('div');
      card.className = 'task-card' + (done ? ' done' : '');
      card.dataset.id = t.id;
      card.innerHTML = `
        <div class="task-check">${done ? '✓' : `<span class="task-icon">${t.icon}</span>`}</div>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-sub">${done ? '完了しました' : t.sub}</div>
        </div>
        <div class="task-arrow">›</div>
      `;
      card.addEventListener('click', () => openFlow(t.id));
      board.appendChild(card);
    });
    updateProgress();
  }

  function updateProgress(){
    const total = tasks.length;
    const doneCount = Object.values(state).filter(Boolean).length;
    const pct = Math.round((doneCount/total)*100);
    document.getElementById('countBadge').textContent = `${doneCount} / ${total} 完了`;
    const ringFg = document.getElementById('ringFg');
    const circumference = 119.4;
    ringFg.style.strokeDashoffset = circumference - (circumference * pct/100);
    document.getElementById('ringLabel').textContent = pct + '%';

    if(doneCount === total){
      setTimeout(() => document.getElementById('overlay').classList.add('show'), 350);
    }
  }

  // Flow overlay logic
  const flow = document.getElementById('flow');
  let currentTaskId = null;

  function openFlow(id){
    if(state[id]) return; // already done, no need to reopen
    const t = tasks.find(x => x.id === id);
    currentTaskId = id;
    document.getElementById('flowTitle').textContent = t.title;
    document.getElementById('flowIcon').textContent = t.flowIcon;
    document.getElementById('flowDesc').textContent = t.desc;
    document.getElementById('flowMock').innerHTML = t.mock.map(m =>
      `<div class="flow-mock-row"><span class="dot"></span>${m}</div>`
    ).join('');
    flow.classList.add('show');
  }

  function closeFlow(){
    flow.classList.remove('show');
    currentTaskId = null;
  }

  document.getElementById('flowBack').addEventListener('click', closeFlow);

  document.getElementById('flowCompleteBtn').addEventListener('click', () => {
    if(currentTaskId){
      state[currentTaskId] = true;
    }
    closeFlow();
    render();
  });

  document.getElementById('closeOverlayBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('show');
  });

  document.getElementById('reportBtn').addEventListener('click', () => {
    const btn = document.getElementById('reportBtn');
    btn.textContent = '✓ 日報を生成しました';
    btn.style.background = 'linear-gradient(135deg,#3ddc84,#7be8ac)';
    btn.style.color = '#06120c';
  });

  render();
</script>
</body>
</html>
